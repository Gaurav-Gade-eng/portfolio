<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="title"
      content="Gaurav Gade | Web Developer Portfolio"
    />
    <meta
      name="description"
      content="Hi, I'm Gaurav Gade — a passionate Web Developer skilled in React, Node.js, and MongoDB. Explore my projects, certifications, and technical skills."
    />
    <meta
      name="keywords"
      content="Gaurav Gade, Web Developer, MERN Developer, React Developer, Portfolio, Node.js, MongoDB, India Developer"
    />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gaurav-portfolio.duckdns.org/" />
    <meta
      property="og:title"
      content="Gaurav Gade | Web Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Explore Gaurav Gade's portfolio showcasing MERN stack projects, certifications, and modern web applications."
    />
    <meta property="og:image" content="/images/profile.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://gaurav-portfolio.duckdns.org/" />
    <meta
      property="twitter:title"
      content="Gaurav Gade | Web Developer Portfolio"
    />
    <meta
      property="twitter:description"
      content="Portfolio of Gaurav Gade — React, Node.js & MongoDB Developer."
    />
    <meta property="twitter:image" content="/images/profile.jpg" />

    <!-- Theme -->
    <meta name="theme-color" content="#030014" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Gaurav Gade | Portfolio</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
